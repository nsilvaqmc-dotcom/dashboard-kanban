<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Tarefas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fb;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 15px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  background: #4a6cf7;
  color: white;
  border: none;
  cursor: pointer;
}

.task {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.task-info {
  flex: 1;
}

.badge {
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 12px;
}

.alta { background: #ff4d4d; color: white; }
.media { background: #ffc107; }
.baixa { background: #28a745; color: white; }

.atrasada {
  border-left: 5px solid red;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}

.actions button {
  margin-left: 5px;
  width: auto;
  padding: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>📋 Minhas Tarefas</h1>

<div class="card">
  <input type="text" id="titulo" placeholder="Nome da tarefa">
  
  <select id="prioridade">
    <option value="alta">Alta</option>
    <option value="media">Média</option>
    <option value="baixa">Baixa</option>
  </select>

  <input type="date" id="data">

  <button onclick="addTask()">Adicionar</button>
</div>

<div id="lista"></div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

</div>

<script>
let tarefas = JSON.parse(localStorage.getItem("tarefas")) || [];

function salvar() {
  localStorage.setItem("tarefas", JSON.stringify(tarefas));
  render();
}

function addTask() {
  const titulo = document.getElementById("titulo").value;
  const prioridade = document.getElementById("prioridade").value;
  const data = document.getElementById("data").value;

  if (!titulo || !data) return alert("Preencha tudo!");

  tarefas.push({
    id: Date.now(),
    titulo,
    prioridade,
    data,
    done: false
  });

  salvar();
}

function toggle(id) {
  tarefas = tarefas.map(t => t.id === id ? {...t, done: !t.done} : t);
  salvar();
}

function deletar(id) {
  tarefas = tarefas.filter(t => t.id !== id);
  salvar();
}

function duplicar(id) {
  const novaData = prompt("Nova data (YYYY-MM-DD):");
  if (!novaData) return;

  const t = tarefas.find(t => t.id === id);

  tarefas.push({
    ...t,
    id: Date.now(),
    data: novaData
  });

  salvar();
}

function hoje() {
  return new Date().toISOString().split("T")[0];
}

function render() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const hojeData = hoje();

  let stats = { total: 0, done: 0, atrasadas: 0 };

  tarefas.forEach(t => {
    let atrasada = !t.done && t.data < hojeData;

    if (atrasada) stats.atrasadas++;
    if (t.done) stats.done++;
    stats.total++;

    const div = document.createElement("div");
    div.className = "card task " + (atrasada ? "atrasada" : "");

    div.innerHTML = `
      <div class="task-info ${t.done ? "done" : ""}">
        <strong>${t.titulo}</strong><br>
        <small>${t.data}</small><br>
        <span class="badge ${t.prioridade}">${t.prioridade}</span>
        ${atrasada ? "⚠️" : ""}
      </div>

      <div class="actions">
        <button onclick="toggle(${t.id})">✔</button>
        <button onclick="duplicar(${t.id})">📄</button>
        <button onclick="deletar(${t.id})">🗑</button>
      </div>
    `;

    lista.appendChild(div);
  });

  renderChart(stats);
}

let chart;

function renderChart(stats) {
  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Total", "Concluídas", "Atrasadas"],
      datasets: [{
        label: "Produtividade",
        data: [stats.total, stats.done, stats.atrasadas]
      }]
    }
  });
}

render();
</script>

</body>
</html>
