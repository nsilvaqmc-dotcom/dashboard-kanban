<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #eef2f5;
}

.topbar {
  padding: 10px;
  background: #2f6f73;
  color: white;
  display: flex;
  justify-content: space-between;
}

.board {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.column {
  min-width: 250px;
  background: white;
  border-radius: 6px;
  padding: 8px;
}

.header {
  font-weight: bold;
  margin-bottom: 8px;
}

.card {
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 5px;
  font-size: 12px;
}

.alta { border-left: 5px solid red; }
.media { border-left: 5px solid orange; }
.baixa { border-left: 5px solid green; }

button {
  font-size: 11px;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="topbar">
  <div>📊 Meu Dashboard</div>
  <button onclick="addTask()">+ Tarefa</button>
</div>

<div id="alerta"></div>

<div class="board" id="board"></div>

<script>
function getData() {
  return JSON.parse(localStorage.getItem("tasks") || "[]");
}

function salvar(data) {
  localStorage.setItem("tasks", JSON.stringify(data));
}

function addTask() {
  const titulo = prompt("Tarefa:");
  const prazo = prompt("Data (YYYY-MM-DD):");
  const prioridade = prompt("Prioridade: alta, media, baixa");

  if (!titulo || !prazo) return;

  const data = getData();

  data.push({
    id: Date.now(),
    titulo,
    prazo,
    prioridade,
    status: "ativo"
  });

  salvar(data);
  render();
}

function getCategoria(prazo) {
  const hoje = new Date().toISOString().slice(0,10);

  if (prazo < hoje) return "atrasado";
  if (prazo === hoje) return "hoje";

  const amanha = new Date();
  amanha.setDate(amanha.getDate() + 1);
  const amanhaStr = amanha.toISOString().slice(0,10);

  if (prazo === amanhaStr) return "amanha";

  return "futuro";
}

function render() {
  const data = getData();

  let atrasado = [], hoje = [], amanha = [], concluido = [];

  data.forEach(t => {
    if (t.status === "concluido") {
      concluido.push(t);
    } else {
      const cat = getCategoria(t.prazo);
      if (cat === "atrasado") atrasado.push(t);
      if (cat === "hoje") hoje.push(t);
      if (cat === "amanha") amanha.push(t);
    }
  });

  document.getElementById("alerta").innerHTML =
    atrasado.length > 0
    ? `<div style="background:red;color:white;padding:8px">
        ⚠️ Você tem ${atrasado.length} tarefas atrasadas
      </div>`
    : "";

  document.getElementById("board").innerHTML = `
    ${coluna("🔴 Atrasado", atrasado)}
    ${coluna("🟡 Hoje", hoje)}
    ${coluna("🔵 Amanhã", amanha)}
    ${coluna("🟢 Concluído", concluido)}
  `;
}

function coluna(nome, lista) {
  return `
    <div class="column">
      <div class="header">${nome}</div>
      ${lista.map(t => `
        <div class="card ${t.prioridade}">
          <b>${t.titulo}</b><br>
          ${t.prazo}<br>
          ⭐ ${t.prioridade}<br>
          <button onclick="concluir(${t.id})">✔</button>
          <button onclick="remover(${t.id})">❌</button>
        </div>
      `).join("")}
    </div>
  `;
}

function concluir(id) {
  const data = getData();
  data.forEach(t => {
    if (t.id === id) t.status = "concluido";
  });
  salvar(data);
  render();
}

function remover(id) {
  let data = getData().filter(t => t.id !== id);
  salvar(data);
  render();
}

render();
</script>

</body>
</html>
