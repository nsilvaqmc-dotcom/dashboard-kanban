<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Kanban PRO</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  background: #eef1f4;
}

.board {
  display: flex;
  gap: 15px;
  padding: 20px;
}

.column {
  background: #f9fbfc;
  border-radius: 8px;
  width: 20%;
  border: 1px solid #dfe3e8;
  display: flex;
  flex-direction: column;
}

.header {
  background: #2f6f73;
  color: white;
  padding: 12px;
  font-weight: bold;
  border-radius: 8px 8px 0 0;
  font-size: 14px;
}

.tasks {
  padding: 10px;
  min-height: 300px;
}

.card {
  background: white;
  border: 1px solid #dfe3e8;
  border-radius: 6px;
  padding: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

.card-title {
  font-weight: 600;
  margin-bottom: 6px;
}

.meta {
  font-size: 12px;
  color: #6b778c;
}

.badge {
  display: inline-block;
  margin-top: 6px;
  padding: 3px 6px;
  border-radius: 4px;
  font-size: 11px;
}

.previsto {
  background: #e3f2fd;
  color: #1976d2;
}

.actions {
  margin-top: 8px;
  display: flex;
  gap: 5px;
}

.actions button {
  border: none;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
}

.edit { background: #ffc107; }
.delete { background: #f44336; color: white; }
.done { background: #4caf50; color: white; }

.footer {
  padding: 10px;
  border-top: 1px dashed #ccc;
  text-align: center;
}

.add-btn {
  background: transparent;
  border: 1px dashed #ff8c42;
  color: #ff8c42;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="board" id="board"></div>

<script>
const dias = ["Segunda","Terça","Quarta","Quinta","Sexta"];

function criarBoard() {
  const board = document.getElementById("board");

  dias.forEach(dia => {
    const id = dia.toLowerCase();

    const col = document.createElement("div");
    col.className = "column";

    col.innerHTML = `
      <div class="header">${dia}</div>
      <div class="tasks" id="${id}"></div>
      <div class="footer">
        <button class="add-btn" onclick="addTask('${id}')">+ Adicionar tarefa</button>
      </div>
    `;

    board.appendChild(col);
  });
}

function getData() {
  let data = JSON.parse(localStorage.getItem("kanban"));
  if (!data) {
    data = {};
    dias.forEach(d => data[d.toLowerCase()] = []);
  }
  return data;
}

function salvar(data) {
  localStorage.setItem("kanban", JSON.stringify(data));
}

function addTask(coluna) {
  const titulo = prompt("Título:");
  if (!titulo) return;

  const responsavel = prompt("Responsável:");
  const prazo = prompt("Prazo:");

  const data = getData();

  data[coluna].push({
    id: Date.now(),
    titulo,
    responsavel,
    prazo,
    status: "Previsto"
  });

  salvar(data);
  render();
}

function render() {
  const data = getData();

  Object.keys(data).forEach(coluna => {
    const el = document.getElementById(coluna);
    el.innerHTML = "";

    data[coluna].forEach(task => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.id = task.id;

      card.innerHTML = `
        <div class="card-title">${task.titulo}</div>
        <div class="meta">👤 ${task.responsavel || "-"}</div>
        <div class="meta">📅 ${task.prazo || "-"}</div>
        <div class="badge previsto">${task.status}</div>

        <div class="actions">
          <button class="done" onclick="concluir(${task.id})">✔</button>
          <button class="edit" onclick="editar(${task.id})">✏️</button>
          <button class="delete" onclick="remover(${task.id})">❌</button>
        </div>
      `;

      el.appendChild(card);
    });
  });

  initDrag();
}

function concluir(id) {
  const data = getData();
  Object.values(data).forEach(lista => {
    lista.forEach(t => {
      if (t.id === id) t.status = "Concluído";
    });
  });
  salvar(data);
  render();
}

function editar(id) {
  const data = getData();
  Object.values(data).forEach(lista => {
    lista.forEach(t => {
      if (t.id === id) {
        t.titulo = prompt("Título:", t.titulo);
        t.responsavel = prompt("Responsável:", t.responsavel);
        t.prazo = prompt("Prazo:", t.prazo);
      }
    });
  });
  salvar(data);
  render();
}

function remover(id) {
  let data = getData();
  Object.keys(data).forEach(k => {
    data[k] = data[k].filter(t => t.id !== id);
  });
  salvar(data);
  render();
}

function initDrag() {
  Object.keys(getData()).forEach(coluna => {
    new Sortable(document.getElementById(coluna), {
      group: "tasks",
      animation: 150,
      onEnd: salvarOrdem
    });
  });
}

function salvarOrdem() {
  let novo = {};
  Object.keys(getData()).forEach(coluna => {
    const el = document.getElementById(coluna);
    novo[coluna] = [];

    [...el.children].forEach(card => {
      const id = Number(card.dataset.id);
      Object.values(getData()).forEach(lista => {
        const found = lista.find(t => t.id === id);
        if (found) novo[coluna].push(found);
      });
    });
  });

  salvar(novo);
}

criarBoard();
render();
</script>

</body>
</html>
